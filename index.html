<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faxx GPT | Terminal</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 1rem; background: #1e293b; border-bottom: 2px solid #3b82f6; text-align: center; font-weight: bold; letter-spacing: 2px; color: #3b82f6; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 10px; max-width: 80%; }
        .user { align-self: flex-end; background: #3b82f6; color: white; }
        .ai { align-self: flex-start; background: #334155; border-left: 4px solid #8b5cf6; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; }
        button { padding: 10px 20px; background: #8b5cf6; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header>FAXX GPT - OPERATIONAL TERMINAL</header>
    <div id="chat-container">
        <div class="message ai">Faxx GPT online. How can I assist you with your investigation?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter command or query...">
        <button onclick="sendMessage()">EXECUTE</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-container');
            if (input.value.trim() === "") return;

            // Add user message
            chat.innerHTML += `<div class="message user">${input.value}</div>`;
            
            // Logic for API call goes here
            console.log("Sending to AI:", input.value);
            
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
